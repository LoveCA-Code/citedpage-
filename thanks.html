<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>문의가 접수되었습니다 | CitedPage</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#111;--sub:#555;--line:#e8e8e8;--accent:#1a56db}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Noto Sans KR",-apple-system,sans-serif;color:var(--ink);line-height:1.7}
    .wrap{max-width:980px;margin:0 auto;padding:0 28px}
    .top{position:sticky;top:0;background:#fff;padding:10px 0;border-bottom:1px solid var(--line)}
    .top .wrap{display:flex;justify-content:space-between;align-items:center}
    .mark{font-size:19px;font-weight:900;letter-spacing:-0.03em;color:var(--ink);text-decoration:none}
    main{padding:130px 0;text-align:center}
    h1{font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:-0.04em}
    p{margin-top:16px;color:var(--sub);font-size:16px}
    a.btn{display:inline-block;margin-top:36px;padding:14px 36px;background:var(--accent);
          color:#fff;text-decoration:none;font-weight:700;font-size:15px}
  </style>
</head>
<body>
  <header class="top">
    <div class="wrap"><a class="mark" href="/">CitedPage</a></div>
  </header>
  <main>
    <div class="wrap">
      <h1>문의가 접수되었습니다.</h1>
      <p>영업일 1일 안에 남겨주신 이메일로 답장드리겠습니다.</p>
      <a class="btn" href="/">홈으로</a>
    </div>
  </main>
</body>
</html>
